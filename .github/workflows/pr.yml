name: "Run formatter/linter on PR"
on:
  pull_request:
    
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.5
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
      - name: Run checks
        run: pnpm biome:check